[project]
name = "wraquant"
version = "1.2.0"
description = "The ultimate quant finance toolkit for Python"
dependencies = [
  "numpy>=2.4.2",
  "scipy>=1.17.1",
  "pandas>=3.0.1",
  "statsmodels>=0.14.6",
  "pydantic>=2.12.5",
  "pydantic-settings>=2.13.1",
  "structlog>=25.5.0",
  "python-dateutil>=2.9.0.post0",
]
requires-python = ">=3.13"
readme = "README.md"
keywords = [
  "quantitative-finance",
  "trading",
  "risk-management",
  "portfolio-optimization",
  "technical-analysis",
  "backtesting",
  "time-series",
  "volatility",
  "garch",
  "regime-detection",
  "options-pricing",
  "machine-learning",
  "bayesian",
  "econometrics",
  "market-microstructure",
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Financial and Insurance Industry",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.13",
  "Topic :: Office/Business :: Financial",
  "Topic :: Office/Business :: Financial :: Investment",
  "Topic :: Scientific/Engineering :: Mathematics",
  "Topic :: Scientific/Engineering :: Information Analysis",
  "Typing :: Typed",
]

[[project.authors]]
name = "William Astley"
email = "william.astley@algebraicwealth.com"

[project.license]
text = "MIT"

[project.urls]
Homepage = "https://github.com/pr1m8/wraquant"
Documentation = "https://wraquant.readthedocs.io"
Repository = "https://github.com/pr1m8/wraquant"
Changelog = "https://github.com/pr1m8/wraquant/blob/main/CHANGELOG.md"
Issues = "https://github.com/pr1m8/wraquant/issues"

