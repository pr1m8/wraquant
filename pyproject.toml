[tool.uv.extra-build-dependencies]
sktime = ["setuptools"]

[tool.pdm]
distribution = true

[tool.pdm.scripts]
test = "pytest tests/ -v"
test-cov = "pytest tests/ --cov=wraquant --cov-report=term-missing"
lint = "trunk check"
fmt = "trunk fmt"
changelog = "git-cliff -o CHANGELOG.md"
docs = "sphinx-build docs docs/_build/html"
dashboard = "streamlit run src/wraquant/dashboard/app.py"

[tool.pdm.scripts.test-mcp]
cmd = "pytest mcp/tests/ -v"

[tool.pdm.scripts.test-mcp.env]
PYTHONPATH = "mcp/src:src"

[tool.pdm.scripts.mcp-server]
cmd = "python -m wraquant_mcp"

[tool.pdm.scripts.mcp-server.env]
PYTHONPATH = "mcp/src:src"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"
markers = [
  "slow: marks tests as slow (deselect with '-m \"not slow\"')",
  "integration: marks integration tests requiring network",
]

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pyright]
pythonVersion = "3.13"
typeCheckingMode = "basic"

[tool.coverage.run]
source = ["wraquant"]
omit = ["*/tests/*", "*/_compat.py"]

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 60

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"
